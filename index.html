<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: white;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .game-wrapper {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      margin: 0 auto;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      gap: 20px;
    }

    .stat {
      flex: 1;
    }

    .stat-label {
      color: #999;
      font-size: 0.9em;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 2em;
      font-weight: bold;
      color: #667eea;
    }

    #gameCanvas {
      display: block;
      margin: 20px auto;
      border: 3px solid #667eea;
      border-radius: 10px;
      background: #f5f5f5;
      max-width: 100%;
      height: auto;
    }

    .controls {
      margin: 20px 0;
      color: #666;
      font-size: 0.95em;
      line-height: 1.6;
    }

    .controls strong {
      color: #667eea;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.1em;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 20px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .game-over {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .game-over.show {
      display: flex;
    }

    .game-over-content {
      background: white;
      padding: 50px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .game-over-content h2 {
      color: #764ba2;
      margin-bottom: 20px;
      font-size: 2em;
    }

    .game-over-content p {
      color: #666;
      margin-bottom: 30px;
      font-size: 1.2em;
    }

    .final-score {
      font-size: 3em;
      color: #667eea;
      margin: 20px 0;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2em;
      }

      .game-wrapper {
        padding: 20px;
      }

      .stats {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐍 Snake</h1>

    <div class="game-wrapper">
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Level</div>
          <div class="stat-value" id="level">1</div>
        </div>
      </div>

      <canvas id="gameCanvas" width="400" height="400"></canvas>

      <div class="controls">
        <div><strong>Arrow Keys</strong> or <strong>WASD</strong> to move</div>
        <div id="statusText">Press Space or click Start to play</div>
      </div>

      <button id="startBtn" onclick="toggleGame()">Start Game</button>
    </div>
  </div>

  <div class="game-over" id="gameOverModal">
    <div class="game-over-content">
      <h2>Game Over!</h2>
      <p>You hit a wall or yourself</p>
      <div class="final-score" id="finalScore">0</div>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score');
    const levelDisplay = document.getElementById('level');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const gameOverModal = document.getElementById('gameOverModal');
    const finalScoreDisplay = document.getElementById('finalScore');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let direction = {x: 1, y: 0};
    let nextDirection = {x: 1, y: 0};
    let score = 0;
    let level = 1;
    let gameRunning = false;
    let gameSpeed = 100;
    let lastFrameTime = 0;

    function drawGame() {
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#667eea';
      snake.forEach((segment, index) => {
        ctx.fillRect(
          segment.x * gridSize + 1,
          segment.y * gridSize + 1,
          gridSize - 2,
          gridSize - 2
        );
        if (index === 0) {
          ctx.fillStyle = '#764ba2';
          ctx.fillRect(
            segment.x * gridSize + 3,
            segment.y * gridSize + 3,
            gridSize - 6,
            gridSize - 6
          );
          ctx.fillStyle = '#667eea';
        }
      });

      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        gridSize / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function update() {
      if (!gameRunning) return;

      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        endGame();
        return;
      }

      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          endGame();
          return;
        }
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        level = Math.floor(score / 50) + 1;
        gameSpeed = Math.max(50, 100 - level * 5);
        scoreDisplay.textContent = score;
        levelDisplay.textContent = level;

        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } else {
        snake.pop();
      }

      drawGame();
    }

    function gameLoop(currentTime) {
      if (currentTime - lastFrameTime >= gameSpeed) {
        update();
        lastFrameTime = currentTime;
      }
      requestAnimationFrame(gameLoop);
    }

    function toggleGame() {
      gameRunning = !gameRunning;
      statusText.textContent = gameRunning ? 'Game Playing' : 'Paused - Press Space to Resume';
      startBtn.textContent = gameRunning ? 'Pause' : 'Resume';
    }

    function endGame() {
      gameRunning = false;
      finalScoreDisplay.textContent = score;
      gameOverModal.classList.add('show');
      startBtn.textContent = 'Start Game';
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        toggleGame();
      }

      const key = e.key.toLowerCase();

      if (key === 'arrowup' || key === 'w') {
        if (direction.y === 0) nextDirection = {x: 0, y: -1};
      } else if (key === 'arrowdown' || key === 's') {
        if (direction.y === 0) nextDirection = {x: 0, y: 1};
      } else if (key === 'arrowleft' || key === 'a') {
        if (direction.x === 0) nextDirection = {x: -1, y: 0};
      } else if (key === 'arrowright' || key === 'd') {
        if (direction.x === 0) nextDirection = {x: 1, y: 0};
      }
    });

    drawGame();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
